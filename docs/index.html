<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>news archive</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <h1><a id="homeTitle" href="/">news archive</a></h1>
        <button id="themeToggle" type="button" aria-label="테마 전환">🌙 Dark</button>
      </div>
    </header>

    <main class="container">
      <section id="homeView" class="home-shell hidden">
        <nav id="helperTabs" class="helper-tabs" aria-label="카테고리 선택"></nav>

        <section class="section-card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Popular Posts</p>
              <h2>인기 게시물</h2>
            </div>
            <p id="popularMeta" class="meta"></p>
          </div>
          <div id="popularGrid" class="popular-grid"></div>
        </section>

        <section class="section-card">
          <div class="section-head trend-head">
            <div>
              <p class="eyebrow">Keyword Radar</p>
              <h2>트렌딩 키워드 및 워드 클라우드</h2>
            </div>
            <div id="periodTabs" class="period-tabs" aria-label="기간 선택"></div>
          </div>

          <div class="trend-layout">
            <div class="trend-panel">
              <div class="panel-head">
                <h3>트렌딩 키워드</h3>
                <p id="trendMeta" class="meta"></p>
              </div>
              <ol id="trendList" class="trend-list"></ol>
            </div>
            <div class="cloud-panel">
              <div class="panel-head">
                <h3>워드 클라우드</h3>
                <p class="meta">상위 30개 키워드</p>
              </div>
              <div id="wordCloud" class="word-cloud"></div>
            </div>
          </div>

          <div id="keywordResultSection" class="keyword-result hidden">
            <div class="panel-head">
              <h3 id="keywordResultTitle">키워드 기사</h3>
              <button id="keywordClearBtn" type="button" class="ghost-btn">선택 해제</button>
            </div>
            <div id="keywordResultList" class="mini-list"></div>
          </div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <div>
              <p class="eyebrow">News Feed</p>
              <h2>뉴스 목록</h2>
            </div>
            <button id="openNewsListBtn" type="button" class="primary-btn">자세히 보기</button>
          </div>
          <p id="homeListMeta" class="meta"></p>
          <div id="homeNewsList" class="list home-list"></div>
        </section>
      </section>

      <section id="newsView" class="hidden">
        <div class="section-head page-head">
          <div>
            <p class="eyebrow">Archive List</p>
            <h2>전체 뉴스 목록</h2>
          </div>
          <button id="backHomeBtn" type="button" class="ghost-btn">홈으로</button>
        </div>

        <section class="toolbar">
          <input id="searchInput" type="search" placeholder="제목, 본문, 키워드 검색" />
          <select id="sortSelect">
            <option value="latest">최신 순</option>
            <option value="oldest">오래된 순</option>
            <option value="title">제목 순</option>
            <option value="category">카테고리 순</option>
          </select>
          <select id="categorySelect">
            <option value="all">전체 카테고리</option>
            <option value="IT">IT</option>
            <option value="취업">취업</option>
            <option value="경제">경제</option>
          </select>
        </section>

        <section id="listView">
          <p class="meta" id="metaLine"></p>
          <div id="listContainer" class="list"></div>
          <div class="pager">
            <button id="firstBtn" type="button">처음</button>
            <button id="prevBtn" type="button">이전</button>
            <span id="pageInfo"></span>
            <button id="nextBtn" type="button">다음</button>
            <button id="lastBtn" type="button">끝</button>
          </div>
        </section>
      </section>

      <section id="detailView" class="detail hidden">
        <button id="backBtn" type="button" class="ghost-btn">이전 화면</button>
        <h2 id="detailTitle"></h2>
        <p id="detailMeta" class="meta"></p>
        <div id="detailKeywords" class="detail-keywords"></div>
        <div id="detailCallout" class="callout">
          <div class="callout-icon">💡</div>
          <div id="detailAiSummary" class="callout-text">요약할 수 없는 내용입니다</div>
        </div>
        <img id="detailThumbnail" class="detail-thumb hidden" alt="기사 썸네일" />
        <article id="detailBody"></article>
      </section>
    </main>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
